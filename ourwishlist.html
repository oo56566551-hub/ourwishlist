<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wishlist - Couple Pairing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #fff5f7;
            margin: 0;
            min-height: 100vh;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .animate-in {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bg-sweet-pink { background-color: #ff85a2; }
        .text-sweet-pink { color: #ff85a2; }
        .border-sweet-pink { border-color: #ff85a2; }
        
        .pairing-card {
            background: linear-gradient(135deg, #ff85a2 0%, #ff6b95 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, getDoc, setDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

        // 使用您指定的 Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBGcnegRndW5qbPI_WdPpMgjBpOHfVa01Y",
            authDomain: "ourwishlist-2f954.firebaseapp.com",
            projectId: "ourwishlist-2f954",
            storageBucket: "ourwishlist-2f954.firebasestorage.app",
            messagingSenderId: "825117136968",
            appId: "1:825117136968:web:47e4562a2ea4f65393a07d",
            measurementId: "G-NS09F6BNN6"
        };        
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'couple-wishlist-v2-stable';

        const { useState, useEffect, useMemo, useCallback } = React;

        const SVG_LIB = {
            plus: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>`,
            heart: (fill = "none") => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="${fill}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>`,
            utensils: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>`,
            mapPin: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`,
            music: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
            checkCircle: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
            user: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
            trash: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>`,
            edit: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>`,
            star: (fill = "none") => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="${fill}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
            copy: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`,
            link: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
            x: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`,
            calendar: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
            qr: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>`,
            chevronDown: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`,
            chevronUp: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>`
        };

        const RawIcon = ({ name, size = 18, className = "", fill = "none" }) => {
            const svgContent = typeof SVG_LIB[name] === 'function' ? SVG_LIB[name](fill) : SVG_LIB[name];
            return React.createElement('div', {
                className: `inline-flex items-center justify-center ${className}`,
                style: { width: size, height: size },
                dangerouslySetInnerHTML: { __html: svgContent }
            });
        };

        function App() {
            const [user, setUser] = useState(null);
            // 核心變數：強迫全局依賴這個穩定的 userId，忽略 Firebase 亂變的 UID
            const [userId, setUserId] = useState(null); 
            
            const [profile, setProfile] = useState({ name: '', shortCode: '' });
            const [partner, setPartner] = useState({ partnerId: null, partnerName: '' });
            const [items, setItems] = useState([]);
            const [filter, setFilter] = useState('all');
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [isProfileModalOpen, setIsProfileModalOpen] = useState(false);
            const [isCodeModalOpen, setIsCodeModalOpen] = useState(false);
            const [showMyCodeSection, setShowMyCodeSection] = useState(false);
            
            const [deleteConfirm, setDeleteConfirm] = useState({ isOpen: false, itemId: null });
            const [ratingModal, setRatingModal] = useState({ isOpen: false, itemId: null, score: 5, comment: '' });
            
            const [pairingInput, setPairingInput] = useState('');
            const [toast, setToast] = useState({ show: false, message: '' });
            const [localNameInput, setLocalNameInput] = useState('');

            const [formData, setFormData] = useState({
                title: '', category: 'restaurant', dateRange: '', description: '', completed: false
            });

            const showToast = useCallback((message) => {
                setToast({ show: true, message });
                setTimeout(() => setToast({ show: false, message: '' }), 3000);
            }, []);

            // 1. 核心修復：強制鎖定身份
            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currUser) => {
                    if (currUser) {
                        // 已經有用戶紀錄（重新整理會進入這裡）
                        setUser(currUser);
                        
                        // 檢查本地是否有舊的 ID
                        let savedUid = localStorage.getItem('couple_wishlist_uid_v4');
                        if (!savedUid) {
                            savedUid = currUser.uid;
                            localStorage.setItem('couple_wishlist_uid_v4', savedUid);
                        }
                        setUserId(savedUid);
                        // 將系統全數綁定至此穩定的 userId
                    } else {
                        // 確定完全沒有用戶紀錄，才建立新的匿名登入
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (e) {
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    }
                });

                return () => unsubscribe();
            }, []);

            // 2. 監聽個人資料
            useEffect(() => {
                if (!userId) return;
                const profileRef = doc(db, 'artifacts', appId, 'users', userId, 'profile', 'info');
                
                const unsubscribe = onSnapshot(profileRef, async (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setProfile(data);
                        setLocalNameInput(data.name || '');
                        
                        if (data.shortCode && data.name) {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'short_codes', data.shortCode), { 
                                uid: userId, name: data.name
                            }, { merge: true });
                        }
                        if (!data.name) setIsProfileModalOpen(true);
                    } else {
                        const sc = userId.substring(0, 8).toUpperCase();
                        const newProfile = { name: '', shortCode: sc, uid: userId };
                        await setDoc(profileRef, newProfile);
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'short_codes', sc), { uid: userId });
                        setProfile(newProfile);
                        setLocalNameInput('');
                        setIsProfileModalOpen(true);
                    }
                });
                return () => unsubscribe();
            }, [userId]);

            // 3. 監聽配對狀態
            useEffect(() => {
                if (!userId) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'pairings');
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => doc.data());
                    const myPair = data.find(p => p.userA === userId || p.userB === userId);
                    if (myPair) {
                        const pId = myPair.userA === userId ? myPair.userB : myPair.userA;
                        const pName = myPair.userA === userId ? myPair.userBName : myPair.userAName;
                        setPartner({ partnerId: pId, partnerName: pName });
                    }
                });
                return () => unsubscribe();
            }, [userId]);

            // 4. 監聽願望清單
            useEffect(() => {
                if (!userId) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'wishlist');
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const filtered = data.filter(item => 
                        item.createdBy === userId || (partner.partnerId && item.createdBy === partner.partnerId)
                    );
                    filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    setItems(filtered);
                }, (err) => console.error("Snapshot error:", err));
                return () => unsubscribe();
            }, [userId, partner.partnerId]);

            const saveProfile = async (e) => {
                e.preventDefault();
                if (!localNameInput.trim() || !userId) return;
                const name = localNameInput.trim();
                
                await updateDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'info'), { name });
                
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'short_codes', profile.shortCode), { 
                    uid: userId, name: name
                }, { merge: true });

                showToast("個人資料已更新");
                if (partner.partnerId) setIsProfileModalOpen(false);
            };

            const handlePairing = async () => {
                const input = pairingInput.trim().toUpperCase();
                if (!input || input === profile.shortCode) {
                    showToast("請輸入正確的配對碼");
                    return;
                }
                
                try {
                    const scRef = doc(db, 'artifacts', appId, 'public', 'data', 'short_codes', input);
                    const scSnap = await getDoc(scRef);
                    if (!scSnap.exists() || !scSnap.data().name) {
                        showToast("找不到該用戶或對方尚未設定暱稱");
                        return;
                    }
                    
                    const partnerUid = scSnap.data().uid;
                    const partnerName = scSnap.data().name;

                    // 檢查對方是否已經跟別人配對了 (防止一對多)
                    const partnerProfileRef = doc(db, 'artifacts', appId, 'users', partnerUid, 'profile', 'info');
                    const partnerProfileSnap = await getDoc(partnerProfileRef);
                    if (partnerProfileSnap.exists()) {
                        const partnerProfileData = partnerProfileSnap.data();
                        if (partnerProfileData.partnerId && partnerProfileData.partnerId !== userId) {
                            showToast("該代碼的用戶已經與其他人配對了！");
                            return;
                        }
                    }

                    // 雙向配對寫入
                    await updateDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'info'), {
                        partnerId: partnerUid,
                        partnerName: partnerName
                    });

                    await updateDoc(partnerProfileRef, {
                        partnerId: userId,
                        partnerName: profile.name
                    });

                    // 寫入公共配對大廳，雙方即時感應
                    const pairId = [userId, partnerUid].sort().join('_');
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pairings', pairId), {
                        userA: userId,
                        userAName: profile.name,
                        userB: partnerUid,
                        userBName: partnerName,
                        timestamp: new Date().toISOString()
                    });

                    showToast("配對成功！ ❤️");
                    setPairingInput('');
                    setIsProfileModalOpen(false);
                } catch (err) {
                    console.error("Pairing Error:", err);
                    showToast("配對失敗");
                }
            };

            const copyMyShortCode = () => {
                if (!profile.shortCode) return;
                const dummy = document.createElement("textarea");
                document.body.appendChild(dummy);
                dummy.value = profile.shortCode;
                dummy.select();
                document.execCommand("copy");
                document.body.removeChild(dummy);
                showToast("配對碼已複製！");
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.title || !userId) return;
                try {
                    if (editingItem) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'wishlist', editingItem.id);
                        await updateDoc(docRef, {
                            title: formData.title, category: formData.category,
                            dateRange: formData.category === 'event' ? formData.dateRange : '',
                            description: formData.description
                        });
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'wishlist'), {
                            ...formData,
                            dateRange: formData.category === 'event' ? formData.dateRange : '',
                            ratings: {}, createdBy: userId,
                            createdByName: profile.name || '夥伴',
                            createdAt: new Date().toISOString()
                        });
                    }
                    closeMainModal();
                } catch (err) { console.error(err); }
            };

            const closeMainModal = () => {
                setIsModalOpen(false);
                setEditingItem(null);
                setFormData({ title: '', category: 'restaurant', dateRange: '', description: '', completed: false });
            };

            const toggleComplete = async (item) => {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'wishlist', item.id);
                await updateDoc(docRef, { completed: !item.completed });
            };

            const submitRating = async () => {
                const { itemId, score, comment } = ratingModal;
                const item = items.find(i => i.id === itemId);
                const updatedRatings = { 
                    ...(item.ratings || {}), 
                    [userId]: { score, comment: comment.trim(), userName: profile.name || '夥伴', time: new Date().toISOString() } 
                };
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'wishlist', itemId), { ratings: updatedRatings });
                setRatingModal({ isOpen: false, itemId: null, score: 5, comment: '' });
                showToast("評價已儲存");
            };

            const filteredItems = useMemo(() => {
                if (filter === 'all') return items.filter(i => !i.completed);
                if (filter === 'completed') return items.filter(i => i.completed);
                return items.filter(i => i.category === filter && !i.completed);
            }, [items, filter]);

            if (!userId || !user) return React.createElement('div', { className: 'min-h-screen flex items-center justify-center bg-[#fff5f7]' }, [
                React.createElement('div', { className: 'text-sweet-pink font-bold animate-pulse' }, '正在進入甜蜜空間...')
            ]);

            return React.createElement('div', { className: 'min-h-screen pb-24 bg-[#fff5f7]' }, [
                // Toast
                toast.show && React.createElement('div', { className: 'fixed top-10 left-1/2 -translate-x-1/2 z-[200] bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-xl font-bold text-sm animate-in flex items-center gap-2' }, [
                    React.createElement(RawIcon, { name: 'heart', size: 14, fill: '#ff85a2' }), toast.message
                ]),

                // Header
                React.createElement('header', { key: 'header', className: 'sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-pink-100 px-6 py-4 shadow-sm' }, 
                    React.createElement('div', { className: 'flex items-center justify-between max-w-2xl mx-auto' }, [
                        React.createElement('div', { className: 'flex items-center gap-2' }, [
                             React.createElement(RawIcon, { name: 'heart', size: 24, fill: '#ff85a2', className: 'text-sweet-pink' }),
                             React.createElement('h1', { className: 'text-xl font-black text-slate-800 tracking-tight' }, 'Our Wishlist')
                        ]),
                        React.createElement('div', { className: 'flex items-center gap-2' }, [
                            React.createElement('button', { onClick: () => setIsCodeModalOpen(true), className: 'p-2.5 text-sweet-pink bg-pink-50 rounded-xl hover:bg-pink-100 transition-colors flex items-center justify-center' }, React.createElement(RawIcon, { name: 'qr', size: 20 })),
                            React.createElement('button', { onClick: () => setIsProfileModalOpen(true), className: 'p-2.5 text-slate-400 bg-slate-50 rounded-xl hover:bg-slate-100 transition-colors flex items-center justify-center' }, React.createElement(RawIcon, { name: 'user', size: 20 })),
                            React.createElement('button', { onClick: () => setIsModalOpen(true), className: 'bg-sweet-pink text-white px-4 py-2.5 rounded-xl shadow-lg shadow-pink-100 text-sm font-black flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all' }, [
                                React.createElement(RawIcon, { name: 'plus', size: 16 }), '新增'
                            ])
                        ])
                    ])
                ),

                // Pair Status
                partner.partnerId && React.createElement('div', { key: 'pair-status', className: 'max-w-2xl mx-auto px-4 mt-6' }, 
                    React.createElement('div', { className: 'pairing-card p-5 rounded-[2rem] text-white shadow-xl flex items-center justify-between overflow-hidden relative' }, [
                        React.createElement('div', { className: 'absolute -right-4 -top-4 opacity-20' }, React.createElement(RawIcon, { name: 'heart', size: 100, fill: 'white' })),
                        React.createElement('div', { className: 'flex items-center gap-4' }, [
                            React.createElement('div', { className: 'flex -space-x-3' }, [
                                React.createElement('div', { className: 'w-12 h-12 rounded-full border-4 border-white/30 bg-white/20 flex items-center justify-center font-black text-lg' }, profile.name?.[0] || '?'),
                                React.createElement('div', { className: 'w-12 h-12 rounded-full border-4 border-white/30 bg-white/20 flex items-center justify-center font-black text-lg' }, partner.partnerName?.[0] || '?')
                            ]),
                            React.createElement('div', null, [
                                React.createElement('p', { className: 'text-[10px] font-black opacity-80 uppercase tracking-widest' }, 'Connected with'),
                                React.createElement('h2', { className: 'text-xl font-black' }, partner.partnerName)
